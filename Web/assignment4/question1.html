<!--
Q1.	In an HTML page-
    o	Use 3 different heading tags to write HTML, CSS, and JavaScript. Use a suitable display property to display them on the same line.
    o	Use 3 different <span> tags to write JSP, JDBC, and MySQL. Use a suitable display property to display them in separate lines.
-->

<html>
<head>
    <style>
        h1, h2, h3 {
            display: inline;
            margin-right: 15px;
        }

        span {
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<h1>HTML</h1>
<h2>CSS</h2>
<h3>JavaScript</h3>
<br><br>
<span>JSP</span>
<span>JDBC</span>
<span>MySQL</span>
</body>
</html>
