<!--Q2.	Design the following login form inside a styled card. Centre align the card with the help of flex box.-->

<html>
<head>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .card {
            background-color: white;
            width: 400px;
            padding: 35px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .card h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .card input[type="text"],
        .card input[type="password"] {
            width: 95%;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid lightgray;
            border-radius: 8px;
            font-size: 15px;
        }

        .remember {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .card button {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Login</h1>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember Me</label>
    </div>
    <button>Login</button>
</div>
</body>
</html>
