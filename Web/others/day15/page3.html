<html>
<head>
    <title>abc</title>
    <script>
        function swap(a, b) {
            a = a + b;
            b = a - b;
            a = a - b;
            document.write("a: " + a + "<br>");
            document.write("b: " + b + "<br>");
        }

        var a = parseInt(prompt("Enter a number: "));
        var b = parseInt(prompt("Enter another number: "));
        swap(a, b);
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
