<html>
<head>
    <title>abc</title>
    <script>
        var a = parseFloat(prompt("Enter a number: "));
        var b = parseFloat(prompt("Enter another number: "));
        document.write("pow: " + Math.pow(a, b) + "<br>");
        document.write("sqrt: " + Math.sqrt(a) + "<br>");
        document.write("ceil: " + Math.ceil(a) + "<br>");
        document.write("floor: " + Math.floor(a) + "<br>");
        document.write("round: " + Math.round(a) + "<br>");
        document.write("abs: " + Math.abs(a) + "<br>");
        document.write("sin: " + Math.sin(a) + "<br>");
        document.write("cos: " + Math.cos(a) + "<br>");
        document.write("tan: " + Math.tan(a) + "<br>");
        document.write("max: " + Math.max(a, b) + "<br>");
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
