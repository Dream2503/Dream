<html>
<head>
    <title>abc</title>
    <script>
        var n = parseInt(prompt("Enter the number of elements in array: "))
        var array = new Array();

        for (var i = 0; i < n; i++) {
            array.push(parseInt(prompt("Enter the " + (i + 1) + " element: ")));
        }
        for (var i = 0; i < n - 1; i++) {
            for (var j = 0; j < n - i - 1; j++) {
                if (array[j] > array[j + 1]) {
                    var temp = array[j];
                    array[j] = array[j + 1];
                    array[j + 1] = temp;
                }
            }
        }
        document.write(array);
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
