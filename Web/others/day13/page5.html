<html>
<head>
    <title>abc</title>
    <script>
        var num = parseInt(prompt("Enter a 4-digit number: "));
        var new_num = num * 2;

        if (Math.floor(new_num / 10) % 10 == Math.floor(new_num / 100) % 10) {
            document.write(num + " is a Strontio number");
        } else {
            document.write(num + " is not a Strontio number");
        }
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
