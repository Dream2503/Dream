<html>
<head>
    <title>abc</title>
    <script>
        var n = parseInt(prompt("Enter a number: "))
        var num = 2, increment = 0;
        document.write("The required series is: ");

        for (var i = 0; i < n; i++) {
            document.write(num + " ");
            increment += 2;
            num += increment;
        }
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
