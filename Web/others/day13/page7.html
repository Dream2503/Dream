<html>
<head>
    <title>abc</title>
    <script>
        var n = parseInt(prompt("Enter a number: "))
        var num = 0, res = 0;

        for (var i = 1; i <= n; i++) {
            num = num * 10 + i;
            res += num
            document.write(num + " ");
        }
        document.write("= " + res);
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
