<html>
<head>
    <title>abc</title>
    <script>
        var a = 1;

        switch (a) {
            case 0:
                document.write("Sunday");
                break;

            case 1:
                document.write("Monday");
                break;

            case 2:
                document.write("Tuesday");
                break;

            case 3:
                document.write("Wednesday");
                break;

            case 4:
                document.write("Thursday");
                break;

            case 5:
                document.write("Friday");
                break;

            case 6:
                document.write("Saturday");
                break;
        }
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
