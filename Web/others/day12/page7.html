<html>
<head>
    <title>abc</title>
    <script>
        var a = 5, b = 3;
        var c = ~a;
        var d = a & b;
        var e = a | b;
        var f = a ^ b;
        var g = a << 2;
        var h = a >> 2;
        document.write(a + " " + b + " " + c + " " + d + " " + e + " " + f + " " + g + " " + h);
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
