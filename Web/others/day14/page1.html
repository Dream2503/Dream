<html>
<head>
    <title>abc</title>
    <script>
        var ch = prompt("Enter a character: "), is_vowel;

        switch (ch) {
            case "a":
            case "e":
            case "i":
            case "o":
            case "u":
            case "A":
            case "E":
            case "I":
            case "O":
            case "U":
                is_vowel = " is a vowel";
                break;

            default:
                is_vowel = " is a consonant";
        }
        document.write(ch + is_vowel);
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
