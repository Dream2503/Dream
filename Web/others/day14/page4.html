<html>
<head>
    <title>abc</title>
    <script>
        var sum = 0, product = 1;

        for (var i = 1; i <= 15; i++) {
            if (i % 2 == 0) {
                sum += i;
            } else {
                product *= i;
            }
        }
        document.write("Sum of all the even number is " + sum + " and the product of all the odd numbers is " + product + " between 1 to 15");
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
