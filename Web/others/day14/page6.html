<html>
<head>
    <title>abc</title>
    <script>
        var n = parseInt(prompt("Enter a number: ")), k = 0;

        for (var i = 0; i < n; i++) {
            for (var j = 0; j <= i; j++) {
                document.write(k++ + " ");
            }
            document.write("<br>")
        }
    </script>
</head>
<body bgcolor="pink" text="violet">
</body>
</html>
