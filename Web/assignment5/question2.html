<!-- Q2. Write a program using a for loop to calculate and print the factorial of a number. -->

<html>
<head>
    <script>
        let n = 5, fact = 1;

        for (let i = 2; i <= n; i++) {
            fact *= i;
        }
        console.log("Factorial of " + n + " is: "+  fact);
    </script>
</head>
</html>
