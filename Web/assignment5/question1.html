<!-- Q1. Write a program using if–else to assign grades based on marks: >=90 → Grade A; >=75 → Grade B; >=50 → Grade C; <50 → Fail -->

<html>
<head>
    <script>
        let marks = 50, grade;

        if (marks >= 90) {
            grade = "Grade A";
        } else if (marks >= 75) {
            grade = "Grade B";
        } else if (marks >= 50) {
            grade = "Grade C";
        } else {
            grade = "Fail";
        }
        console.log(grade);
    </script>
</head>
</html>
